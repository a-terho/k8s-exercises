apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-output-dep
spec:
  replicas: 1
  selector:
    matchLabels:
      app: log-output
  template:
    metadata:
      labels:
        app: log-output
    spec:
      volumes:
        - name: shared-tmp-files
          emptyDir: {}
        - name: persistent-files
          persistentVolumeClaim:
            claimName: local-volume1-claim
      containers:
        - name: log-output-write
          image: alterho/log-output:1.11-write
          volumeMounts:
            - name: shared-tmp-files
              mountPath: /usr/src/app/tmp
        - name: log-output-read
          image: alterho/log-output:1.11-read
          volumeMounts:
            - name: shared-tmp-files
              mountPath: /usr/src/app/tmp
            - name: persistent-files
              mountPath: /usr/src/app/files
