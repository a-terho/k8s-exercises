apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-app-dep
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todo-app-dep
  template:
    metadata:
      labels:
        app: todo-app-dep
    spec:
      containers:
        - name: todo-app
          image: alterho/todo-app:1.5
          env:
            - name: PORT
              value: '3003'
