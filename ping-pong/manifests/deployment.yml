apiVersion: apps/v1
kind: Deployment
metadata:
  name: ping-pong-dep
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ping-pong
  template:
    metadata:
      labels:
        app: ping-pong
    spec:
      volumes:
        - name: persistent-files
          persistentVolumeClaim:
            claimName: local-volume1-claim
      containers:
        - name: ping-pong
          image: alterho/ping-pong:1.11
          env:
            - name: PORT
              value: '3001'
          volumeMounts:
            - name: persistent-files
              mountPath: /usr/src/app/files
